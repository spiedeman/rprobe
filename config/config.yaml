# RemoteSSH 配置文件示例
# 支持YAML格式

# SSH连接配置
host: "debian13.local"
username: "spiedy"
password: "bhr0204"  # 建议使用密钥认证
port: 22

# 密钥认证配置
# key_filename: "~/.ssh/id_rsa"
# key_password: "your-key-password"  # 可选，如果密钥有密码

# 连接超时配置（秒）
timeout: 30.0          # 连接超时
command_timeout: 300.0 # 命令执行超时

# 数据接收配置
encoding: "utf-8"
max_output_size: 10485760  # 10MB

# 性能优化配置
recv_mode: "auto"      # auto, select, adaptive, original
recv_poll_interval: 0.001  # 仅用于original模式（秒）

# 日志配置
logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "colored"       # simple, colored, json
  output_file: null       # 日志文件路径，null表示不输出到文件
  max_bytes: 10485760     # 10MB
  backup_count: 5

# 连接池配置
pool:
  max_size: 10            # 最大连接数
  min_size: 1             # 最小连接数
  max_idle: 300           # 最大空闲时间（秒）
  max_age: 3600          # 最大连接寿命（秒）
  acquire_timeout: 30    # 获取连接超时（秒）
  health_check_interval: 60  # 健康检查间隔（秒）
